site_name: Amazon PPC Wiki — Student Edition
site_description: Learn Amazon PPC from scratch — a beginner-friendly knowledge base for aspiring Amazon advertising specialists
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
plugins:
  - search
nav:
  - Home: index.md
  - Complete Guide: complete-data-filled-guide.md
  - Glossary: glossary/index.md
  - Formulas & Calculators: appendix/formulas-calculators.md
  - Training: training/index.md
